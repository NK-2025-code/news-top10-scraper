<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 Daily Top 10 News - Intelligent News Aggregation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #666;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .lang-btn:hover {
            transform: scale(1.05);
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-top: 80px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 10px 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            background: white;
            color: #666;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .update-time {
            color: #999;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .news-list {
            display: grid;
            gap: 20px;
        }

        .news-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideIn 0.5s ease-out;
            border-left: 5px solid #667eea;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .news-card.tech { border-left-color: #667eea; }
        .news-card.supply_chain { border-left-color: #f093fb; }
        .news-card.politics { border-left-color: #4facfe; }
        .news-card.ai { border-left-color: #43e97b; }
        .news-card.business { border-left-color: #fa709a; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .news-rank {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            font-size: 1.2em;
            margin-right: 15px;
            margin-bottom: 10px;
        }

        .news-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .news-category {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .news-source {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .news-score {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .stars {
            color: #ffc107;
        }

        .news-summary {
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .news-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.2s ease;
            font-weight: 500;
        }

        .news-link:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .news-card {
                padding: 15px;
            }

            .news-title {
                font-size: 1.1em;
            }

            .language-switcher {
                position: static;
                margin-bottom: 20px;
                justify-content: center;
            }

            .header {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 语言切换器 -->
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="container">
        <div class="header">
            <h1 data-i18n="title">📰 每日Top 10新闻</h1>
            <div class="subtitle" data-i18n="subtitle">智能新闻聚合 · 每天早上9点自动更新</div>
            
            <!-- 分类筛选 -->
            <div class="category-filter">
                <button class="category-btn active" data-category="all" data-i18n="all">全部</button>
                <button class="category-btn" data-category="tech" data-i18n="cat_tech">🔧 科技类</button>
                <button class="category-btn" data-category="ai" data-i18n="cat_ai">🤖 AI专题</button>
                <button class="category-btn" data-category="business" data-i18n="cat_business">💼 商业类</button>
                <button class="category-btn" data-category="supply_chain" data-i18n="cat_supply">📦 供应链</button>
                <button class="category-btn" data-category="politics" data-i18n="cat_politics">🏛️ 政治</button>
            </div>

            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="number" id="total">-</div>
                    <div class="label" data-i18n="total_articles">📊 总文章数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="topCount">-</div>
                    <div class="label" data-i18n="top_articles">🎯 精选新闻</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="sourceCount">-</div>
                    <div class="label" data-i18n="news_sources">🌍 新闻源</div>
                </div>
            </div>

            <div class="update-time" id="updateTime" data-i18n="loading">正在加载数据...</div>
        </div>

        <div class="news-list" id="newsList">
            <div class="loading" data-i18n="loading">🔄 加载中...</div>
        </div>
    </div>

    <script>
        // ==================== 国际化配置 ====================
        const translations = {
            zh: {
                title: '📰 每日Top 10新闻',
                subtitle: '智能新闻聚合 · 每天自动更新',
                total_articles: '📊 总文章数',
                top_articles: '🎯 精选新闻',
                news_sources: '🌍 新闻源',
                loading: '🔄 加载中...',
                loading_data: '正在加载数据...',
                error_loading: '❌ 无法加载新闻数据',
                error_file: '请确保 data/news.json 文件存在',
                no_data: '暂无新闻数据',
                read_more: '阅读原文 →',
                last_update: '最后更新：',
                all: '全部',
                cat_tech: '🔧 科技类',
                cat_ai: '🤖 AI专题',
                cat_business: '💼 商业类',
                cat_supply: '📦 供应链',
                cat_politics: '🏛️ 政治',
                score: '评分'
            },
            en: {
                title: '📰 Daily Top 10 News',
                subtitle: 'Intelligent News Aggregation',
                total_articles: '📊 Total Articles',
                top_articles: '🎯 Featured News',
                news_sources: '🌍 News Sources',
                loading: '🔄 Loading...',
                loading_data: 'Loading data...',
                error_loading: '❌ Failed to load news data',
                error_file: 'Please ensure data/news.json file exists',
                no_data: 'No news data available',
                read_more: 'Read More →',
                last_update: 'Last Updated: ',
                all: 'All',
                cat_tech: '🔧 Technology',
                cat_ai: '🤖 AI',
                cat_business: '💼 Business',
                cat_supply: '📦 Supply Chain',
                cat_politics: '🏛️ Politics',
                score: 'Score'
            }
        };

        // ==================== 语言管理 ====================
        class LanguageManager {
            constructor() {
                this.currentLanguage = localStorage.getItem('language') || 'zh';
                this.init();
            }

            init() {
                this.updateUI();
                this.setupListeners();
            }

            setupListeners() {
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setLanguage(e.target.dataset.lang);
                    });
                });
            }

            setLanguage(lang) {
                this.currentLanguage = lang;
                localStorage.setItem('language', lang);
                this.updateUI();
            }

            t(key) {
                return translations[this.currentLanguage][key] || key;
            }

            updateUI() {
                // 更新按钮状态
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === this.currentLanguage);
                });

                // 更新文本
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.dataset.i18n;
                    el.textContent = this.t(key);
                });
            }
        }

        // ==================== 新闻加载和显示 ====================
        const langManager = new LanguageManager();
        let allArticles = [];
        let currentCategory = 'all';

        async function loadNews() {
            try {
                const response = await fetch('https://api.github.com/repos/NK-2025-code/news-top10-scraper/contents/data/news.json');
                
                if (!response.ok) {
                    throw new Error(langManager.t('error_loading'));
                }
                
                const apiData = await response.json();
                
                // 🔧 修复乱码问题的核心代码：
                // 弃用直接的 atob()，改用 Uint8Array 结合 TextDecoder 正确解码包含中文的 UTF-8 数据
                const binaryString = atob(apiData.content);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decoder = new TextDecoder('utf-8');
                const content = decoder.decode(bytes);
                // -----------------------------------------------------

                const data = JSON.parse(content);
                allArticles = data.articles || [];
                
                updateStats(data);
                displayNews(allArticles);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('newsList').innerHTML = `
                    <div class="error">
                        <p>${langManager.t('error_loading')}</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">${langManager.t('error_file')}</p>
                    </div>
                `;
            }
        }

        function updateStats(data) {
            const articles = data.articles || [];
            const totalArticles = data.total_articles || 0;
            const sourceSet = new Set(articles.map(a => a.source));

            document.getElementById('total').textContent = totalArticles;
            document.getElementById('topCount').textContent = articles.length;
            document.getElementById('sourceCount').textContent = sourceSet.size;

            const date = new Date(data.generated_at);
            const timeStr = date.toLocaleString(langManager.currentLanguage === 'zh' ? 'zh-CN' : 'en-US');
            document.getElementById('updateTime').textContent = `${langManager.t('last_update')}${timeStr}`;
        }

        function displayNews(articles) {
            // 筛选文章
            let filteredArticles = articles;
            if (currentCategory !== 'all') {
                filteredArticles = articles.filter(a => a.category === currentCategory);
            }

            if (filteredArticles.length === 0) {
                document.getElementById('newsList').innerHTML = `<div class="error">${langManager.t('no_data')}</div>`;
                return;
            }

            const newsHTML = filteredArticles.map((article, index) => {
                const score = article.score || 0;
                const stars = Math.round(score * 5);
                const starDisplay = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
                const category = article.category || 'tech';

                return `
                    <div class="news-card ${category}">
                        <div class="news-header">
                            <div class="news-rank">${index + 1}</div>
                            <div style="flex: 1;">
                                <div class="news-title">${article.title}</div>
                                <div class="news-meta">
                                    <span class="news-category">${article.category_display || article.category}</span>
                                    <span class="news-source">📌 ${article.source}</span>
                                    <span class="news-score">
                                        <span class="stars">${starDisplay}</span>
                                        ${score.toFixed(2)}
                                    </span>
                                </div>
                                <div class="news-summary">${article.summary}</div>
                                <a href="${article.link}" target="_blank" class="news-link">${langManager.t('read_more')}</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('newsList').innerHTML = newsHTML;
        }

        // ==================== 事件监听 ====================
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                displayNews(allArticles);
            });
        });

        // ==================== 初始化 ====================
        loadNews();
        setInterval(loadNews, 5 * 60 * 1000);
    </script>
</body>
</html>
