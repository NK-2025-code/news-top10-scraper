<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 每日Top 10新闻 - 智能新闻聚合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .update-time {
            color: #999;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .news-list {
            display: grid;
            gap: 20px;
        }

        .news-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .news-rank {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            font-size: 1.2em;
            margin-right: 15px;
            margin-bottom: 10px;
        }

        .news-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .news-source {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .news-score {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .stars {
            color: #ffc107;
        }

        .news-summary {
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .news-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.2s ease;
            font-weight: 500;
        }

        .news-link:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .news-card {
                padding: 15px;
            }

            .news-title {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 每日Top 10新闻</h1>
            <div class="subtitle">智能新闻聚合 · 每天早上9点自动更新</div>
            
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="number" id="total">-</div>
                    <div class="label">📊 总文章数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="topCount">-</div>
                    <div class="label">🎯 精选新闻</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="sourceCount">-</div>
                    <div class="label">🌍 新闻源</div>
                </div>
            </div>

            <div class="update-time" id="updateTime">正在加载数据...</div>
        </div>

        <div class="news-list" id="newsList">
            <div class="loading">🔄 加载中...</div>
        </div>
    </div>

    <script>
        // 从GitHub获取news.json数据
        async function loadNews() {
            try {
                const response = await fetch('../data/news.json');
                
                if (!response.ok) {
                    throw new Error('无法获取数据');
                }
                
                const data = await response.json();
                displayNews(data);
            } catch (error) {
                console.error('错误:', error);
                document.getElementById('newsList').innerHTML = `
                    <div class="error">
                        <p>❌ 无法加载新闻数据</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">请确保 data/news.json 文件存在</p>
                    </div>
                `;
            }
        }

        function displayNews(data) {
            const articles = data.articles || [];
            const totalArticles = data.total_articles || 0;
            const sourceSet = new Set(articles.map(a => a.source));

            // 更新统计信息
            document.getElementById('total').textContent = totalArticles;
            document.getElementById('topCount').textContent = articles.length;
            document.getElementById('sourceCount').textContent = sourceSet.size;

            // 更新时间
            const date = new Date(data.generated_at);
            const timeStr = date.toLocaleString('zh-CN');
            document.getElementById('updateTime').textContent = `最后更新：${timeStr}`;

            // 生成新闻列表
            const newsHTML = articles.map((article, index) => {
                const score = article.score || 0;
                const stars = Math.round(score * 5);
                const starDisplay = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);

                return `
                    <div class="news-card">
                        <div class="news-header">
                            <div class="news-rank">${index + 1}</div>
                            <div style="flex: 1;">
                                <div class="news-title">${article.title}</div>
                                <div class="news-meta">
                                    <span class="news-source">📌 ${article.source}</span>
                                    <span class="news-score">
                                        <span class="stars">${starDisplay}</span>
                                        ${score.toFixed(2)}
                                    </span>
                                </div>
                                <div class="news-summary">${article.summary}</div>
                                <a href="${article.link}" target="_blank" class="news-link">阅读原文 →</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('newsList').innerHTML = newsHTML || '<div class="error">暂无新闻数据</div>';
        }

        // 页面加载时获取数据
        loadNews();

        // 每5分钟刷新一次数据
        setInterval(loadNews, 5 * 60 * 1000);
    </script>
</body>
</html>
